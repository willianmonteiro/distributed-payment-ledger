services:
  # Bank A (src/, NestJS)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ledger']
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Bank B (bank-b/, FastAPI) — a separate institution, its own database
  postgres-bank-b:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bank_b
      POSTGRES_PASSWORD: bank_b
      POSTGRES_DB: bank_b
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bank_b']
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - postgres-bank-b-data:/var/lib/postgresql/data

  # Hub (hub/, NestJS) — the central settlement authority every bank talks to.
  postgres-hub:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hub
      POSTGRES_PASSWORD: hub
      POSTGRES_DB: hub
    ports:
      - '5435:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hub']
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - postgres-hub-data:/var/lib/postgresql/data

  # Message broker shared by every bank and the Hub. Ephemeral by design:
  # the outbox table in each service's own Postgres is the durable source
  # of truth, not the broker — a lost queue just means the relay republishes.
  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'check_port_connectivity']
      interval: 5s
      timeout: 5s
      retries: 15

volumes:
  postgres-data:
  postgres-bank-b-data:
  postgres-hub-data:
